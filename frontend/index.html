<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Secure Log Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* BODY */
body {
    display: flex;
    background: radial-gradient(circle, #0f172a, #020617);
    color: white;
    transition: 0.3s;
}

/* LIGHT MODE */
body.light {
    background: #f1f5f9;
    color: black;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: rgba(2,6,23,0.9);
    padding: 20px;
    border-right: 1px solid #1e293b;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    margin-top: 20px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(2,6,23,0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 16px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* INPUT */
textarea {
    width: 100%;
    height: 120px;
    background: #0f172a;
    border-radius: 10px;
    border: none;
    padding: 10px;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    color: white;
    cursor: pointer;
}

/* BADGE */
.badge {
    padding: 5px 10px;
    border-radius: 8px;
    font-weight: bold;
}

.high { background: red; }
.medium { background: orange; }
.low { background: green; }

/* FINDINGS */
.finding {
    display: flex;
    justify-content: space-between;
    padding: 5px;
    margin: 5px 0;
    background: #0f172a;
    border-radius: 8px;
}

/* ACTIVITY */
#activity {
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
}

/* LOADER */
.loader {
    display: none;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔐 AI Analyzer</h2>
    <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">🚀 AI Secure Log Analyzer</div>

<div class="grid">

<!-- INPUT -->
<div class="card">
    <h3>📂 Logs</h3>
    <input type="file" id="file">
    <textarea id="log" placeholder="Paste logs..."></textarea>
    <button onclick="analyze()">Analyze</button>
</div>

<!-- SUMMARY -->
<div class="card">
    <h3>📊 Summary</h3>
    <p id="summary">No data</p>
</div>

<!-- RISK -->
<div class="card">
    <h3>⚠ Risk</h3>
    <span id="riskLevel" class="badge">-</span>
    <p>Score: <span id="riskScore">0</span></p>
</div>

<!-- FINDINGS -->
<div class="card">
    <h3>🔍 Findings</h3>
    <div id="findings"></div>
</div>

<!-- INSIGHTS -->
<div class="card">
    <h3>🤖 Insights</h3>
    <ul id="insights"></ul>
</div>

<!-- CHART -->
<div class="card">
    <h3>📈 Risk Chart</h3>
    <canvas id="chart"></canvas>
</div>

<!-- ACTIVITY -->
<div class="card">
    <h3>🕒 Activity</h3>
    <div id="activity"></div>
</div>

</div>

<div class="loader" id="loader">Analyzing...</div>

</div>

<script>

// THEME
function toggleTheme() {
    document.body.classList.toggle("light");
}

// CHART
let chart;
window.onload = function() {
    const ctx = document.getElementById("chart");
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: "Risk",
                data: [],
                borderWidth: 2
            }]
        }
    });
};

// ANALYZE (UNCHANGED)
function analyze() {
    const fileInput = document.getElementById("file").files[0];
    const log = document.getElementById("log").value;

    document.getElementById("loader").style.display = "block";

    if (fileInput) {
        const formData = new FormData();
        formData.append("file", fileInput);

        fetch("/analyze", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(updateUI)
        .catch(showError);

    } else {
        fetch("/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                input_type: "log",
                content: log
            })
        })
        .then(res => res.json())
        .then(updateUI)
        .catch(showError);
    }
}

// UPDATE UI (ENHANCED)
function updateUI(data) {
    document.getElementById("loader").style.display = "none";

    document.getElementById("summary").innerText = data.summary;

    let badge = document.getElementById("riskLevel");
    badge.innerText = data.risk_level.toUpperCase();
    badge.className = "badge " + data.risk_level;

    document.getElementById("riskScore").innerText = data.risk_score;

    // FINDINGS
    let findingsHTML = "";
    data.findings.forEach(f => {
        findingsHTML += `<div class="finding">
            <span>${f.type}: ${f.value}</span>
            <span class="badge ${f.risk}">${f.risk}</span>
        </div>`;
    });
    document.getElementById("findings").innerHTML = findingsHTML;

    // INSIGHTS
    let insightsHTML = "";
    data.insights.forEach(i => {
        insightsHTML += `<li>${i}</li>`;
    });
    document.getElementById("insights").innerHTML = insightsHTML;

    // CHART UPDATE
    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(data.risk_score);
    chart.update();

    // ACTIVITY
    document.getElementById("activity").innerHTML =
        `<div>Analyzed → Risk: ${data.risk_score}</div>` +
        document.getElementById("activity").innerHTML;
}

function showError(err) {
    document.getElementById("loader").innerText = "Error: " + err;
}

</script>

</body>
</html>
